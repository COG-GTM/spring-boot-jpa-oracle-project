name: Trigger Devin Unit Test Generation on PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  trigger-devin-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            return files.data.map(f => f.filename).join('\n');
          result-encoding: string

      - name: Trigger Devin session for Java unit tests
        env:
          DEVIN_WEBHOOK_URL: ${{ secrets.DEVIN_WEBHOOK_URL }}
          DEVIN_WEBHOOK_SECRET: ${{ secrets.DEVIN_WEBHOOK_SECRET }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPOSITORY: ${{ github.repository }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.result }}
        run: |
          if [ -z "$DEVIN_WEBHOOK_URL" ] || [ -z "$DEVIN_WEBHOOK_SECRET" ]; then
            echo "::warning::DEVIN_WEBHOOK_URL or DEVIN_WEBHOOK_SECRET not set. Skipping webhook trigger."
            echo "Configure these secrets in Settings → Secrets and variables → Actions."
            exit 0
          fi

          jq -n \
            --arg pr_url "$PR_URL" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            --arg base_branch "$BASE_BRANCH" \
            --arg head_branch "$HEAD_BRANCH" \
            --arg repository "$REPOSITORY" \
            --arg changed_files "$CHANGED_FILES" \
            '{
              pr_url: $pr_url,
              pr_number: $pr_number,
              pr_title: $pr_title,
              pr_description: $pr_body,
              base_branch: $base_branch,
              head_branch: $head_branch,
              repository: $repository,
              changed_files: $changed_files
            }' > /tmp/payload.json

          echo "Sending webhook to Devin..."
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$DEVIN_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -H "X-Webhook-Secret: $DEVIN_WEBHOOK_SECRET" \
            -d @/tmp/payload.json)

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/response.txt
          echo ""

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Devin webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Devin session triggered successfully for Java unit test generation."
