name: Java 11 Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Build
        run: mvn -B -e clean compile
      - name: Verify (skip tests — no test classes)
        run: mvn -B -e -DskipTests verify
